<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | MD1125</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <div id="enterDetails" class="input-form">
      <h2>Create Project</h2>
      <div class="input-field">
        <input type="text" id="enterID" required>
        <label>Project ID</label>
      </div>
      <div class="input-field">
        <input type="text" id="enterName" required>
        <label>Project Name</label>
      </div>
      <div class="input-field">
        <input type="number" id="enterAge" required>
        <label>Project Auth Code</label>
      </div>
      <button id="insert">CREATE</button>
      <button id="remove">REMOVE</button>
    </div>

    <div id="findDetails" class="input-form">
      <h2>Find Project by ID</h2>
      <div class="input-field">
        <input type="text" id="findID" required>
        <label>Project ID</label>
      </div>
      <button id="find">FIND</button>
      <div id="foundDetails">
        <h3 id="findName"></h3>
        <h3 id="findAge"></h3>
      </div>
    </div>
  </div>

  <script type="module">
    // Firebase configuration and initialization
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getDatabase, ref, get, set, update, remove, child } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";

    const firebaseConfig = {
    apiKey: "AIzaSyDLSpaTU7oRd1wnFD-cGPVR227tUJJB2NE",
    authDomain: "md1125-1125.firebaseapp.com",
    databaseURL: "https://md1125-1125-default-rtdb.firebaseio.com",
    projectId: "md1125-1125",
    storageBucket: "md1125-1125.appspot.com",
    messagingSenderId: "218457370949",
    appId: "1:218457370949:web:57c67de84f4e7453d2ce2c",
    measurementId: "G-3BKYZRDM87"
  };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase();

    document.addEventListener('DOMContentLoaded', (event) => {
      const insertBtn = document.querySelector('#insert');
      const removeBtn = document.querySelector('#remove');
      const findBtn = document.querySelector('#find');

      insertBtn.addEventListener('click', InsertData);
      removeBtn.addEventListener('click', RemoveData);
      findBtn.addEventListener('click', FindData);
    });

    function InsertData() {
      set(ref(db, "Projects/" + enterID.value), {
        Projekt_Name: enterName.value,
        Projekt_ID: enterID.value,
        Projekt_Auth_Code: enterAge.value
      }).then(() => {
        alert("Data added successfully");
      }).catch((error) => {
        alert(error);
      });
    }

    function UpdateData() {
      update(ref(db, "Projects/" + enterID.value), {
        Projekt_Name: enterName.value,
        Projekt_Auth_Code: enterAge.value
      }).then(() => {
        alert("Data updated successfully");
      }).catch((error) => {
        alert(error);
      });
    }

    function RemoveData() {
      remove(ref(db, "Projects/" + enterID.value)).then(() => {
        alert("Data deleted successfully");
      }).catch((error) => {
        alert(error);
      });
    }

    function FindData() {
      const dbref = ref(db);
      const projectId = findID.value;

      get(child(dbref, `Projects/${projectId}`)).then((snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          findName.innerHTML = `Project Name: ${data.Projekt_Name}`;
          findAge.innerHTML = `Auth Code: ${data.Projekt_Auth_Code}`;
          // Apply styles to found project details
          document.getElementById('foundDetails').style.marginTop = '20px';
          findName.style.color = '#fff';
          findAge.style.color = '#fff';
        } else {
          alert("No data found");
        }
      }).catch((error) => {
        alert(error.message);
      });
    }
  </script>
</body>
</html>
